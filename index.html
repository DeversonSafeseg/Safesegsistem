<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<title>SafeSeg — Controle de Treinamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --black:#0a0a0a;
    --black-2:#121110;
    --panel:#181613;
    --panel-2:#211d17;
    --line:#3a3120;
    --line-soft:#2a2419;
    --gold:#f5c542;
    --gold-bright:#ffd95a;
    --gold-deep:#c79320;
    --gold-dim:#a8966a;
    --ink:#f4efe2;
    --ink-dim:#a89a78;
    --ok:#b7c44a;        /* verde-oliva que combina com dourado */
    --ok-bg:rgba(183,196,74,.13);
    --warn:#f0a92b;
    --warn-bg:rgba(240,169,43,.13);
    --bad:#e0593a;        /* vermelho-terra */
    --bad-bg:rgba(224,89,58,.13);
    --glow:0 0 24px rgba(245,197,66,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{
    background:
      radial-gradient(900px 500px at 50% -8%, rgba(245,197,66,.10), transparent 60%),
      var(--black);
    color:var(--ink);
    font-family:"Inter",-apple-system,Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 15px 90px;min-height:100vh}

  /* topo */
  header{display:flex;align-items:center;gap:13px;padding:20px 2px 16px}
  .logo{
    width:50px;height:50px;border-radius:13px;flex:none;position:relative;
    background:radial-gradient(circle at 35% 30%, #2a2415, #0d0b07);
    border:1.5px solid var(--gold-deep);display:grid;place-items:center;
    box-shadow:var(--glow);
  }
  .logo svg{width:30px;height:30px;color:var(--gold)}
  .brand h1{font-family:"Oswald",sans-serif;font-size:23px;font-weight:700;
    letter-spacing:.5px;line-height:1}
  .brand h1 b{color:var(--gold);font-weight:700}
  .brand p{font-size:10.5px;color:var(--ink-dim);letter-spacing:3px;
    text-transform:uppercase;margin-top:3px}

  /* faixa decorativa estilo logo */
  .rule{height:2px;background:linear-gradient(90deg,transparent,var(--gold-deep),var(--gold),var(--gold-deep),transparent);
    margin:0 0 18px;border-radius:2px;opacity:.7}

  /* abas */
  .tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line-soft);
    border-radius:14px;padding:5px;margin-bottom:18px}
  .tab{flex:1;text-align:center;padding:12px 8px;border-radius:10px;
    font-family:"Oswald",sans-serif;font-size:14px;font-weight:600;letter-spacing:.8px;
    text-transform:uppercase;color:var(--ink-dim);cursor:pointer;border:none;
    background:none;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
  .tab svg{width:17px;height:17px}
  .tab.active{background:linear-gradient(145deg,var(--gold),var(--gold-deep));
    color:#1a1405;box-shadow:0 4px 14px rgba(245,197,66,.3)}
  .tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  .panel{display:none;animation:fade .25s ease}
  .panel.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}}

  .card{background:var(--panel);border:1px solid var(--line-soft);
    border-radius:18px;padding:20px}
  .card + .card{margin-top:14px}

  label.field{display:block;margin-bottom:14px}
  label.field span{display:block;font-size:11px;font-weight:700;color:var(--gold-dim);
    text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
  input[type=text]{width:100%;background:var(--black-2);border:1px solid var(--line);
    border-radius:11px;padding:15px;color:var(--ink);font-size:17px;font-family:inherit}
  input[type=text]:focus{outline:none;border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(245,197,66,.18)}
  input::placeholder{color:#6b6149}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;
    font-family:"Oswald",sans-serif;font-size:16px;font-weight:600;letter-spacing:.8px;
    text-transform:uppercase;border:none;border-radius:13px;padding:16px;cursor:pointer;
    transition:.15s;background:var(--panel-2);color:var(--gold);border:1px solid var(--line)}
  .btn svg{width:18px;height:18px}
  .btn.primary{background:linear-gradient(145deg,var(--gold-bright),var(--gold-deep));
    color:#1a1405;border:none;box-shadow:0 5px 18px rgba(245,197,66,.28)}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn.block + .btn.block{margin-top:11px}

  /* QR gerado */
  #qrBox{margin-top:18px;display:none;flex-direction:column;align-items:center;gap:14px;
    padding:22px;background:#fff;border-radius:16px}
  #qrBox.show{display:flex}
  .qr-cpf{color:#1a1405;font-family:"Oswald";font-weight:700;font-size:16px;letter-spacing:2px}
  .qr-actions{display:flex;gap:10px;width:100%}
  .qr-actions .btn{font-size:13px;padding:13px}
  .btn.dark{background:#1a1405;color:var(--gold-bright);border:none}

  /* câmera */
  .scanner{position:relative;border-radius:16px;overflow:hidden;background:#000;
    aspect-ratio:3/4;max-height:62vh;display:grid;place-items:center}
  .scanner video{width:100%;height:100%;object-fit:cover}
  .scanner canvas{display:none}
  .frame{position:absolute;inset:0;pointer-events:none;display:grid;place-items:center}
  .frame .box{width:62%;aspect-ratio:1;max-width:250px;border-radius:18px;position:relative}
  .frame .box::before,.frame .box::after,
  .frame .box i::before,.frame .box i::after{content:"";position:absolute;width:32px;height:32px;
    border:3px solid var(--gold);filter:drop-shadow(0 0 5px rgba(245,197,66,.6))}
  .frame .box::before{top:0;left:0;border-right:0;border-bottom:0;border-radius:6px 0 0 0}
  .frame .box::after{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 6px 0 0}
  .frame .box i::before{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 6px}
  .frame .box i::after{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 6px 0}
  .scanline{position:absolute;left:8%;right:8%;height:2px;top:10%;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    box-shadow:0 0 12px rgba(245,197,66,.7);animation:varre 2.4s ease-in-out infinite}
  @keyframes varre{50%{top:88%}}
  .scan-hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;
    font-size:12px;color:var(--gold-bright);letter-spacing:1.5px;text-transform:uppercase}
  .cam-off{text-align:center;padding:34px 20px}
  .cam-off p{color:var(--ink-dim);font-size:14px;margin-bottom:18px}

  /* resultado */
  #resultado{display:none;margin-top:16px}
  #resultado.show{display:block}
  .person{display:flex;align-items:center;gap:15px;padding:20px;
    background:linear-gradient(145deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:18px;margin-bottom:14px;box-shadow:var(--glow)}
  .avatar{width:56px;height:56px;border-radius:15px;flex:none;
    background:linear-gradient(145deg,var(--gold-bright),var(--gold-deep));
    display:grid;place-items:center;color:#1a1405;font-family:"Oswald";font-weight:700;font-size:21px}
  .person .nm{font-family:"Oswald";font-size:20px;font-weight:600;letter-spacing:.3px}
  .person .cpf{font-size:13px;color:var(--ink-dim);letter-spacing:1px;margin-top:1px}
  .tally{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
  .pill.ok{background:var(--ok-bg);color:var(--ok)}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.bad{background:var(--bad-bg);color:var(--bad)}

  .cert{background:var(--panel);border:1px solid var(--line-soft);border-radius:16px;
    padding:17px 18px;margin-bottom:11px;border-left:4px solid var(--line)}
  .cert.valido{border-left-color:var(--ok)}
  .cert.vencendo{border-left-color:var(--warn)}
  .cert.vencido{border-left-color:var(--bad)}
  .cert-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:13px}
  .cert-name{font-family:"Oswald";font-size:17px;font-weight:600;letter-spacing:.3px}
  .cert-name small{display:block;font-family:"Inter";font-size:12px;color:var(--gold-dim);
    font-weight:500;letter-spacing:.5px;margin-top:2px}
  .status{font-family:"Oswald";font-size:11px;font-weight:600;text-transform:uppercase;
    letter-spacing:1px;padding:6px 11px;border-radius:9px;white-space:nowrap}
  .status.valido{background:var(--ok-bg);color:var(--ok)}
  .status.vencendo{background:var(--warn-bg);color:var(--warn)}
  .status.vencido{background:var(--bad-bg);color:var(--bad)}
  .cert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:13px}
  .meta .k{font-size:10px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .meta .v{font-size:13.5px;font-weight:600}

  .empty,.loading{text-align:center;padding:38px 20px;color:var(--ink-dim);font-size:14px}
  .empty b{color:var(--gold)}
  .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;margin:0 auto 14px;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);background:var(--panel-2);
    border:1px solid var(--gold-deep);color:var(--ink);padding:13px 20px;border-radius:12px;
    font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.6);opacity:0;transition:.3s;z-index:50;
    max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:var(--bad)}

  footer{text-align:center;font-size:11px;color:var(--gold-dim);margin-top:26px;letter-spacing:1px}

  @media (prefers-reduced-motion:reduce){.scanline{animation:none}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5l-8-3z"/><path d="m9 12 2 2 4-4"/>
      </svg>
    </div>
    <div class="brand">
      <h1>Safe<b>Seg</b></h1>
      <p>Segurança do Trabalho</p>
    </div>
  </header>
  <div class="rule"></div>

  <div class="tabs" role="tablist">
    <button class="tab active" id="t-scan" role="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>
      Escanear
    </button>
    <button class="tab" id="t-gen" role="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 21v.01M17 21h.01M21 17h.01"/></svg>
      Gerar QR
    </button>
  </div>

  <!-- ESCANEAR -->
  <section class="panel show" id="p-scan">
    <div class="card">
      <div class="scanner" id="scanner">
        <div class="cam-off" id="camOff">
          <p>Use a câmera do celular para ler o QR do colaborador.</p>
          <button class="btn primary" id="btnCam">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Ligar câmera
          </button>
        </div>
        <video id="video" playsinline muted style="display:none"></video>
        <canvas id="canvas"></canvas>
        <div class="frame" id="frame" style="display:none"><div class="box"><i></i><div class="scanline"></div></div></div>
        <div class="scan-hint" id="scanHint" style="display:none">Aponte para o QR Code</div>
      </div>
      <div style="margin-top:14px">
        <label class="field" style="margin:0">
          <span>Ou digite o CPF</span>
          <input type="text" id="cpfManual" inputmode="numeric" placeholder="000.000.000-00">
        </label>
        <button class="btn block" id="btnBuscar" style="margin-top:12px">Buscar certificados</button>
      </div>
    </div>
    <div id="resultado"></div>
  </section>

  <!-- GERAR -->
  <section class="panel" id="p-gen">
    <div class="card">
      <label class="field">
        <span>CPF do colaborador</span>
        <input type="text" id="cpfGerar" inputmode="numeric" placeholder="000.000.000-00">
      </label>
      <button class="btn primary block" id="btnGerar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 21v.01"/></svg>
        Gerar QR Code
      </button>
      <div id="qrBox">
        <div id="qrCanvas"></div>
        <div class="qr-cpf" id="qrCpfLabel"></div>
        <div class="qr-actions">
          <button class="btn dark" id="btnBaixar">Baixar</button>
          <button class="btn dark" id="btnImprimir">Imprimir</button>
        </div>
      </div>
    </div>
    <p style="font-size:12px;color:var(--ink-dim);text-align:center;margin-top:14px;line-height:1.7">
      Imprima o QR e cole no crachá ou capacete.<br>Ao escanear, aparecem todos os treinamentos do colaborador.
    </p>
  </section>

  <footer>SafeSeg · consulta em tempo real</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===========================================================
   COLE A URL DO SEU APPS SCRIPT AQUI (passo 3 do guia)
   =========================================================== */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDb7wiydNsfeKzMI2dJakifPrXwtKmStuiSRBjNRNfrg7Ead_G5beKOoAcMTpZZE9f/exec";

/* Endereço público desta aplicação (GitHub Pages).
   É o que o QR vai embutir para abrir direto pela câmera do celular.
   Deixe "" para o QR usar automaticamente o endereço onde a página estiver. */
const APP_URL = "https://deversonsafeseg.github.io/Safesegsistem/";
/* =========================================================== */

const tabs={scan:document.getElementById('t-scan'),gen:document.getElementById('t-gen')};
const panels={scan:document.getElementById('p-scan'),gen:document.getElementById('p-gen')};
function abrir(q){Object.keys(tabs).forEach(k=>{tabs[k].classList.toggle('active',k===q);
  panels[k].classList.toggle('show',k===q);});if(q!=='scan')pararCamera();}
tabs.scan.onclick=()=>abrir('scan');
tabs.gen.onclick=()=>abrir('gen');

function mascara(el){el.addEventListener('input',()=>{let v=el.value.replace(/\D/g,'').slice(0,11);
  v=v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  el.value=v;});}
mascara(document.getElementById('cpfGerar'));
mascara(document.getElementById('cpfManual'));
const soDigitos=s=>(s||'').replace(/\D/g,'');

/* gerar */
document.getElementById('btnGerar').onclick=()=>{
  const cpf=soDigitos(document.getElementById('cpfGerar').value);
  if(cpf.length!==11){toast('Informe um CPF com 11 dígitos.',true);return;}
  const holder=document.getElementById('qrCanvas');holder.innerHTML='';
  /* monta o link que abre a aplicação já com o CPF */
  const base=(APP_URL&&APP_URL.trim())?APP_URL.trim():(location.origin+location.pathname);
  const link=base.replace(/\?.*$/,'').replace(/#.*$/,'')+'?cpf='+cpf;
  new QRCode(holder,{text:link,width:210,height:210,correctLevel:QRCode.CorrectLevel.H,
    colorDark:"#1a1405",colorLight:"#ffffff"});
  document.getElementById('qrCpfLabel').textContent=document.getElementById('cpfGerar').value;
  document.getElementById('qrBox').classList.add('show');
};
function qrSrc(){const i=document.querySelector('#qrCanvas img')||document.querySelector('#qrCanvas canvas');
  if(!i)return null;return i.tagName==='IMG'?i.src:i.toDataURL();}
document.getElementById('btnBaixar').onclick=()=>{const s=qrSrc();if(!s){toast('Gere o QR primeiro.',true);return;}
  const a=document.createElement('a');a.href=s;a.download='qr-'+soDigitos(document.getElementById('cpfGerar').value)+'.png';a.click();};
document.getElementById('btnImprimir').onclick=()=>{const s=qrSrc();if(!s){toast('Gere o QR primeiro.',true);return;}
  const w=window.open('');w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:40px"><img src="${s}" style="width:300px"><p style="font-size:20px;letter-spacing:2px">${document.getElementById('cpfGerar').value}</p></div>`);
  w.document.close();w.focus();setTimeout(()=>w.print(),300);};

/* câmera */
const video=document.getElementById('video'),canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
let stream=null,lendo=false,ultimo='',ultimoT=0;
document.getElementById('btnCam').onclick=ligarCamera;
async function ligarCamera(){
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    video.srcObject=stream;await video.play();
    document.getElementById('camOff').style.display='none';video.style.display='block';
    document.getElementById('frame').style.display='grid';
    document.getElementById('scanHint').style.display='block';
    lendo=true;requestAnimationFrame(loop);
  }catch(e){toast('Não foi possível acessar a câmera. Permita o acesso e use HTTPS.',true);}
}
function pararCamera(){lendo=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  video.style.display='none';document.getElementById('camOff').style.display='block';
  document.getElementById('frame').style.display='none';document.getElementById('scanHint').style.display='none';}
function loop(){if(!lendo)return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data){const cpf=soDigitos(code.data),agora=Date.now();
      if(cpf.length===11&&!(cpf===ultimo&&agora-ultimoT<4000)){ultimo=cpf;ultimoT=agora;buscar(cpf);}}
  }requestAnimationFrame(loop);}

document.getElementById('btnBuscar').onclick=()=>{const cpf=soDigitos(document.getElementById('cpfManual').value);
  if(cpf.length!==11){toast('Informe um CPF válido.',true);return;}buscar(cpf);};

/* consulta */
async function buscar(cpf){
  const box=document.getElementById('resultado');box.classList.add('show');
  box.innerHTML='<div class="card"><div class="loading"><div class="spinner"></div>Consultando certificados…</div></div>';
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL.includes('COLE_AQUI')){
    box.innerHTML='<div class="card"><div class="empty">⚙️ Configure a URL do Apps Script na constante <b>APPS_SCRIPT_URL</b>.</div></div>';return;}
  try{const r=await fetch(`${APPS_SCRIPT_URL}?cpf=${cpf}`);const data=await r.json();render(data,cpf);}
  catch(e){box.innerHTML='<div class="card"><div class="empty">Falha na consulta. Verifique a conexão e a URL.</div></div>';}
}
function iniciais(n){if(!n)return'?';const p=n.trim().split(/\s+/);return((p[0]||'')[0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase();}
function formataCpf(c){return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');}
function classificar(s){s=(s||'').toLowerCase();
  if(s.includes('vencend')||s.includes('breve')||s.includes('expir'))return'vencendo';
  if(s.includes('venc')||s.includes('inval'))return'vencido';return'valido';}
function campo(k,v){return v?`<div class="meta"><div class="k">${k}</div><div class="v">${v}</div></div>`:'';}
function render(data,cpf){
  const box=document.getElementById('resultado');
  if(!data||data.ok===false){box.innerHTML=`<div class="card"><div class="empty">Nenhum colaborador encontrado para <b>${formataCpf(cpf)}</b>.</div></div>`;beep(220,260);return;}
  const certs=data.treinamentos||[];let nV=0,nA=0,nX=0;
  certs.forEach(c=>{const s=classificar(c.status);if(s==='valido')nV++;else if(s==='vencendo')nA++;else nX++;});
  let html=`<div class="person"><div class="avatar">${iniciais(data.nome)}</div><div style="flex:1">
    <div class="nm">${data.nome||'Colaborador'}</div><div class="cpf">${formataCpf(cpf)}</div>
    <div class="tally">
      ${nV?`<span class="pill ok">${nV} válido${nV>1?'s':''}</span>`:''}
      ${nA?`<span class="pill warn">${nA} vencendo</span>`:''}
      ${nX?`<span class="pill bad">${nX} vencido${nX>1?'s':''}</span>`:''}
      ${!certs.length?`<span class="pill bad">sem certificados</span>`:''}
    </div></div></div>`;
  if(!certs.length){html+=`<div class="card"><div class="empty">Sem treinamentos cadastrados para este colaborador.</div></div>`;}
  else{certs.forEach(c=>{const s=classificar(c.status);
    const rot={valido:'Válido',vencendo:'Vence em breve',vencido:'Vencido'}[s];
    html+=`<div class="cert ${s}"><div class="cert-top">
      <div class="cert-name">${c.treinamento||c.nr||'Treinamento'}${c.nr&&c.treinamento?`<small>${c.nr}</small>`:''}</div>
      <span class="status ${s}">${rot}</span></div>
      <div class="cert-grid">
        ${campo('Emissão',c.emissao)}${campo('Validade',c.validade)}
        ${campo('Carga horária',c.carga)}${campo('Instituição',c.instituicao)}
        ${campo('Instrutor',c.instrutor)}${campo('Certificado nº',c.numero)}
      </div></div>`;});}
  box.innerHTML=html;beep(nX?220:880,nX?260:170);
}

let toastT;function toast(m,err){const t=document.getElementById('toast');
  t.textContent=m;t.className='toast show'+(err?' err':'');clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2900);}
let ac;function beep(f,d){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.type='sine';
  o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.07,ac.currentTime);o.start();
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d/1000);o.stop(ac.currentTime+d/1000);}catch(_){}}

/* ABERTURA VIA QR: se a URL trouxer ?cpf=..., já busca automaticamente */
(function(){
  const params=new URLSearchParams(location.search);
  const cpf=soDigitos(params.get('cpf')||'');
  if(cpf.length===11){
    abrir('scan');
    document.getElementById('cpfManual').value=formataCpf(cpf);
    buscar(cpf);
    /* limpa o CPF da barra de endereço por privacidade, sem recarregar */
    history.replaceState(null,'',location.pathname);
  }
})();
